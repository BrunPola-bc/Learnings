spring.application.name=people-service

server.port=16071

spring.datasource.url=jdbc:postgresql://localhost:5432/cv_microservices
spring.datasource.username=testinguser
spring.datasource.password=TestingUserPass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.name=disabled
spring.security.user.password=disabled

springdoc.swagger-ui.path=/swagger-ui.html